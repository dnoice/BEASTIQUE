<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEASTIQUE — Insecta Splash Mockup · The Pinning</title>
<style>
  :root {
    --gold: #c8a45c;
    --signal: #f2bc00;
    --void: #0a0a0a;
    --text: #e8e4dc;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    /* ── the pinning timeline ── */
    --mk-plate: 0.05s;
    --mk-frame: 0.30s;
    --mk-word: 0.60s;
    --mk-alive: 0.95s;   /* hover ×2 ends 3.65; flap ×2 ends 3.55 */
    --mk-pin: 3.80s;     /* impact ≈ 4.02 */
    --mk-label: 4.25s;
    --mk-footer: 4.60s;
    /* held breath 5.1 → 5.7; JS lifts at 5.7 */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    font-family: Georgia, serif;
    overflow: hidden;
    height: 100vh;
  }

  /* ── the hall beneath (stand-in) ── */
  .hall {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    text-align: center;
    background:
      radial-gradient(ellipse 60% 45% at 50% 42%, rgba(200, 164, 92, 0.06), transparent 70%),
      var(--void);
  }
  .hall__eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0;
  }
  .hall__title {
    font-size: clamp(2.2rem, 6vw, 4.2rem);
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--text);
    opacity: 0;
  }
  .hall__line {
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(232, 228, 220, 0.5);
    opacity: 0;
  }
  .hall__replay {
    margin-top: 2rem;
    font-family: 'Courier New', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    background: none;
    border: 1px solid rgba(200, 164, 92, 0.35);
    padding: 0.7em 1.6em;
    cursor: pointer;
    opacity: 0;
  }
  .is-done .hall__eyebrow { animation: hallUp 0.6s var(--ease-out-expo) 0.35s forwards; }
  .is-done .hall__title   { animation: hallUp 0.7s var(--ease-out-expo) 0.45s forwards; }
  .is-done .hall__line    { animation: hallUp 0.7s var(--ease-out-expo) 0.60s forwards; }
  .is-done .hall__replay  { animation: hallUp 0.7s ease 0.90s forwards; }
  @keyframes hallUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── the splash: a plate on black velvet ── */
  .splash {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse 70% 60% at 50% 46%, rgba(200, 164, 92, 0.05), transparent 70%),
      #0d0b08;
  }
  .is-done .splash {
    transform: translateY(-103%);
    transition: transform 0.95s cubic-bezier(0.7, 0, 0.2, 1);
  }
  .splash__hint {
    position: absolute;
    bottom: 1.6rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Courier New', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(232, 228, 220, 0.35);
    opacity: 0;
    animation: hallUp 0.8s ease 0.9s forwards;
  }

  .splash svg {
    height: min(92vh, 76vw);
    width: auto;
    filter: drop-shadow(0 26px 60px rgba(0, 0, 0, 0.65));
    opacity: 0;
    transform: scale(0.965);
    animation: plateIn 0.8s var(--ease-out-expo) var(--mk-plate) forwards;
  }
  @keyframes plateIn {
    to { opacity: 1; transform: scale(1); }
  }

  /* ── frames draw themselves ── */
  .mk-frame {
    stroke-dasharray: 100;
    stroke-dashoffset: 100;
    animation: frameDraw 1.0s var(--ease-out-expo) var(--mk-frame) forwards;
  }
  .mk-frame--inner { animation-delay: calc(var(--mk-frame) + 0.15s); }
  @keyframes frameDraw { to { stroke-dashoffset: 0; } }

  /* ── wordmark ── */
  .mk-wordmark {
    opacity: 0;
    animation: mkUp 0.7s var(--ease-out-expo) var(--mk-word) forwards;
  }
  @keyframes mkUp { to { opacity: 1; } }

  /* ── the morpho arrives ALIVE ── */
  .mk-morphoWrap {
    opacity: 0;
    transform: translateY(-26px);
    animation: arrive 0.55s var(--ease-out-expo) var(--mk-alive) forwards;
  }
  @keyframes arrive {
    to { opacity: 1; transform: translateY(0); }
  }

  /* it hovers… (two slow breaths, settling right before the pin) */
  #g-morpho {
    animation: hover 1.35s ease-in-out var(--mk-alive) 2 both;
  }
  @keyframes hover {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-16px); }
  }

  /* …and its wings beat (top-view flap = scaleX toward the body axis) */
  #g-left-forewing, #g-left-hindwing,
  #g-right-forewing, #g-right-hindwing {
    transform-box: fill-box;
  }
  #g-left-forewing, #g-left-hindwing { transform-origin: 100% 50%; }
  #g-right-forewing, #g-right-hindwing { transform-origin: 0% 50%; }

  #g-left-forewing  { animation: flap 1.25s ease-in-out calc(var(--mk-alive) + 0.10s) 2 both; }
  #g-right-forewing { animation: flap 1.25s ease-in-out calc(var(--mk-alive) + 0.10s) 2 both; }
  #g-left-hindwing  { animation: flap 1.25s ease-in-out calc(var(--mk-alive) + 0.20s) 2 both; }
  #g-right-hindwing { animation: flap 1.25s ease-in-out calc(var(--mk-alive) + 0.20s) 2 both; }
  @keyframes flap {
    0%, 100% { transform: scaleX(1); }
    50%      { transform: scaleX(0.24); }
  }

  /* its shadow stays faint while it flies… */
  .mk-shadow {
    opacity: 0;
    animation:
      shadowFaint 0.55s ease var(--mk-alive) forwards,
      shadowLand 0.45s ease calc(var(--mk-pin) + 0.18s) forwards;
  }
  @keyframes shadowFaint { to { opacity: 0.18; } }
  @keyframes shadowLand  { to { opacity: 1; } }

  /* ── the pin ── */
  .mk-pin {
    opacity: 0;
    animation: pinDrop 0.32s cubic-bezier(0.55, 0, 1, 0.45) var(--mk-pin) forwards;
  }
  @keyframes pinDrop {
    0%   { opacity: 0; transform: translateY(-330px); }
    12%  { opacity: 1; }
    72%  { transform: translateY(0); }
    84%  { transform: translateY(-5px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* the board takes the impact */
  .splash svg { transform-origin: 50% 46%; }
  .is-live .splash svg { animation: plateIn 0.8s var(--ease-out-expo) var(--mk-plate) forwards,
                                    jolt 0.22s ease calc(var(--mk-pin) + 0.20s); }
  @keyframes jolt {
    0%, 100% { translate: 0 0; }
    40%      { translate: 0 3px; }
  }

  /* ── the cataloguing ── */
  .mk-label {
    opacity: 0;
    transform: translateY(12px);
    animation: mkRise 0.55s var(--ease-out-expo) var(--mk-label) forwards;
  }
  .mk-footer {
    opacity: 0;
    animation: mkUp 0.6s ease var(--mk-footer) forwards;
  }
  @keyframes mkRise {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── skip: snap the tableau complete ── */
  .is-skip .mk-frame,
  .is-skip .mk-wordmark,
  .is-skip .mk-morphoWrap,
  .is-skip #g-morpho,
  .is-skip #g-left-forewing, .is-skip #g-right-forewing,
  .is-skip #g-left-hindwing, .is-skip #g-right-hindwing,
  .is-skip .mk-shadow,
  .is-skip .mk-pin,
  .is-skip .mk-label,
  .is-skip .mk-footer,
  .is-skip .splash svg { animation: none; }

  .is-skip .splash svg { opacity: 1; transform: scale(1); }
  .is-skip .mk-frame { stroke-dashoffset: 0; }
  .is-skip .mk-wordmark { opacity: 1; }
  .is-skip .mk-morphoWrap { opacity: 1; transform: translateY(0); }
  .is-skip .mk-shadow { opacity: 1; }
  .is-skip .mk-pin { opacity: 1; transform: translateY(0); }
  .is-skip .mk-label { opacity: 1; transform: translateY(0); }
  .is-skip .mk-footer { opacity: 1; }

  @media (prefers-reduced-motion: reduce) {
    .splash { display: none; }
    .hall__eyebrow, .hall__title, .hall__line, .hall__replay { opacity: 1; animation: none; }
  }
</style>

<script>
  (() => {
    const LIFT_MS = 5700;
    const body = document.body;
    let done = false;

    function lift(skipped) {
      if (done) return;
      done = true;
      if (skipped) {
        body.classList.add('is-skip');
        setTimeout(() => body.classList.add('is-done'), 220);
      } else {
        body.classList.add('is-done');
      }
      removeListeners();
    }

    const onInput = () => lift(true);
    function removeListeners() {
      ['click', 'keydown', 'wheel', 'touchstart'].forEach(t =>
        document.removeEventListener(t, onInput));
    }
    ['click', 'keydown', 'wheel', 'touchstart'].forEach(t =>
      document.addEventListener(t, onInput, { passive: true }));

    if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
      body.classList.add('is-done');
      removeListeners();
    } else {
      setTimeout(() => lift(false), LIFT_MS);
    }
  })();
