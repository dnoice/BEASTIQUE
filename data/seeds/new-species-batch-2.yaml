species:

# =============================================================================
# MORE MAMMALS
# =============================================================================

- common_name: Platypus
  scientific_name: Ornithorhynchus anatinus
  status: NT
  taxonomy:
    class: Mammalia
    order: Monotremata
    family: Ornithorhynchidae
  biome: Freshwater Rivers and Streams
  range: Eastern Australia and Tasmania
  population_estimate: ~300,000 individuals
  primary_threats:
    - Habitat degradation and pollution
    - Climate change affecting water systems
    - Drowning in fishing nets and traps
  description: One of only five species of egg-laying mammals. Possesses electroreception, venomous spurs, and a duck-like bill—so bizarre that scientists initially thought it was a hoax.
  intriguing_facts:
    - Males have venomous spurs on their hind legs that can cause excruciating pain
    - They detect prey using electroreceptors in their bill that sense muscle movements
    - Platypus fur is waterproof and denser than polar bear fur
  beastique_material_suggestion: Beaver-brown velvet with copper bill detail
  beastique_narrative: The platypus is nature's rough draft, a creature that defies categories—proof that evolution plays with possibilities we could never imagine.

- common_name: Pangolin
  scientific_name: Manis javanica
  status: CR
  taxonomy:
    class: Mammalia
    order: Pholidota
    family: Manidae
  biome: Tropical Rainforest
  range: Southeast Asia
  population_estimate: Unknown, rapidly declining
  primary_threats:
    - Illegal trafficking for scales and meat
    - Habitat loss
    - Traditional medicine trade
  description: The world's most trafficked mammal, covered in keratin scales like armored artichokes. When threatened, they curl into a tight ball that even lions cannot open.
  intriguing_facts:
    - Their tongue can be longer than their body and is anchored near the pelvis
    - Pangolin scales are made of keratin, the same protein as human fingernails
    - A single pangolin can consume 70 million ants per year
  beastique_material_suggestion: Overlapping bronze scales with amber core
  beastique_narrative: The pangolin rolls into itself for protection, but no armor can shield it from human greed—the most trafficked mammal on Earth vanishes scale by scale.

- common_name: Aardvark
  scientific_name: Orycteropus afer
  status: LC
  taxonomy:
    class: Mammalia
    order: Tubulidentata
    family: Orycteropodidae
  biome: Savanna, Grassland
  range: Sub-Saharan Africa
  population_estimate: Unknown, stable
  primary_threats:
    - Habitat loss
    - Hunting for bushmeat
    - Climate change affecting food sources
  description: The sole living species in its order, this nocturnal insectivore has rabbit-like ears, a pig-like snout, and a kangaroo-like tail. Its name means "earth pig" in Afrikaans.
  intriguing_facts:
    - Aardvarks can eat 50,000 insects in one night
    - Their abandoned burrows provide shelter for over 20 other species
    - They are the only fruit-eating animal to bury their food like a seed
  beastique_material_suggestion: Sandy ceramic with large amber ear details
  beastique_narrative: The aardvark digs through African nights, an evolutionary orphan whose abandoned homes become shelters for dozens of other creatures—an architect of the underground.

- common_name: African Wild Dog
  scientific_name: Lycaon pictus
  status: EN
  taxonomy:
    class: Mammalia
    order: Carnivora
    family: Canidae
  biome: Savanna, Grassland
  range: Sub-Saharan Africa (fragmented)
  population_estimate: ~6,600 individuals
  primary_threats:
    - Habitat fragmentation
    - Human-wildlife conflict
    - Disease from domestic dogs
  description: Africa's most efficient predator with an 80% hunt success rate. Lives in tight-knit packs with complex social structures including communal pup-rearing and democratic voting on pack decisions.
  intriguing_facts:
    - They "vote" on when to hunt by sneezing—more sneezes mean the pack moves out
    - Pack members regurgitate food for sick or elderly members who cannot hunt
    - Each dog has unique coat patterns, like human fingerprints
  beastique_material_suggestion: Mottled bronze with painted enamel patches
  beastique_narrative: The painted wolf runs in a democracy of teeth and devotion—a pack animal whose loyalty to family makes our divisions seem barbaric by comparison.

# =============================================================================
# MORE BIRDS
# =============================================================================

- common_name: Bald Eagle
  scientific_name: Haliaeetus leucocephalus
  status: LC
  taxonomy:
    class: Aves
    order: Accipitriformes
    family: Accipitridae
  biome: Forests near water, Coastal areas
  range: North America - Alaska to Mexico
  population_estimate: ~316,000 individuals
  primary_threats:
    - Lead poisoning from ammunition
    - Habitat loss
    - Collision with power lines
  description: A conservation success story, recovering from near-extinction due to DDT. The national bird of the United States and an apex predator of North American waterways.
  intriguing_facts:
    - Bald eagle nests can weigh over 2 tons and be used for 35+ years
    - They can see fish from a mile away and fly at 100 mph in a dive
    - Benjamin Franklin famously called them birds of "bad moral character"
  beastique_material_suggestion: Dark bronze body with white gold head
  beastique_narrative: The bald eagle soared back from extinction's doorstep, a feathered phoenix that proved we can still choose to save what we nearly destroyed.

- common_name: Peacock
  scientific_name: Pavo cristatus
  status: LC
  taxonomy:
    class: Aves
    order: Galliformes
    family: Phasianidae
  biome: Deciduous Forest, Scrubland
  range: South Asia - India, Sri Lanka, Pakistan
  population_estimate: ~100,000+ individuals
  primary_threats:
    - Habitat loss
    - Hunting
    - Pesticide poisoning
  description: The national bird of India, famous for the male's iridescent train feathers used in elaborate courtship displays. The "eyes" on the feathers are called ocelli.
  intriguing_facts:
    - The train contains up to 200 feathers and is molted and regrown annually
    - Peahens choose mates based on the number and size of eyespots in the train
    - Their calls can reach 100 decibels, as loud as a motorcycle
  beastique_material_suggestion: Iridescent blue-green with gold eyespot details
  beastique_narrative: The peacock unfurls a cosmos of eyes, each feather a small universe of color—a living argument that beauty itself is a form of survival.

- common_name: Ostrich
  scientific_name: Struthio camelus
  status: LC
  taxonomy:
    class: Aves
    order: Struthioniformes
    family: Struthionidae
  biome: Savanna, Desert
  range: Africa
  population_estimate: ~2,000,000 individuals
  primary_threats:
    - Habitat loss
    - Hunting for feathers and leather
    - Egg collection
  description: The largest living bird, flightless but capable of running at 45 mph. Their eggs are the largest of any bird, and their eyes are larger than their brains.
  intriguing_facts:
    - Ostriches don't bury their heads in sand—this myth comes from their flat-lying escape behavior
    - A single ostrich egg weighs as much as 24 chicken eggs
    - Their kick can kill a lion
  beastique_material_suggestion: Sandy bronze with stark white plume accents
  beastique_narrative: The ostrich trades flight for speed, soaring across savannas on legs like pistons—proof that giving up one power can unlock another.

# =============================================================================
# MORE REPTILES
# =============================================================================

- common_name: Anaconda
  scientific_name: Eunectes murinus
  status: NE
  taxonomy:
    class: Reptilia
    order: Squamata
    family: Boidae
  biome: Tropical Rainforest, Wetlands
  range: South America - Amazon and Orinoco basins
  population_estimate: Unknown
  primary_threats:
    - Habitat loss
    - Hunting for skin and meat
    - Fear-based killing
  description: The heaviest snake in the world, capable of reaching 550 pounds and 30 feet. An ambush predator that constricts prey including caimans, deer, and jaguars.
  intriguing_facts:
    - Females are significantly larger than males and sometimes eat males after mating
    - They give live birth to 20-40 babies, each already 2 feet long
    - Anacondas can hold their breath for 10 minutes while submerged
  beastique_material_suggestion: Olive-bronze with darker diamond pattern inlay
  beastique_narrative: The anaconda coils through Amazonian waters like a living river—ancient, patient, and increasingly homeless as the jungle burns.

- common_name: Chameleon
  scientific_name: Chamaeleo calyptratus
  status: LC
  taxonomy:
    class: Reptilia
    order: Squamata
    family: Chamaeleonidae
  biome: Tropical Forest, Scrubland
  range: Yemen, Saudi Arabia (Veiled Chameleon)
  population_estimate: Stable in range
  primary_threats:
    - Habitat loss
    - Collection for pet trade
    - Climate change
  description: Masters of camouflage with independently rotating eyes, projectile tongues, and zygodactyl feet. Their color changes reflect mood, temperature, and communication rather than camouflage.
  intriguing_facts:
    - Their tongue can accelerate faster than a fighter jet and extends 2x their body length
    - Each eye can focus independently, giving 360-degree vision
    - Color change is controlled by nanocrystals in their skin, not pigment
  beastique_material_suggestion: Color-shifting dichroic glass with articulated grip
  beastique_narrative: The chameleon rewrites itself in real-time, a living mood ring that reminds us that identity can be as fluid as the light that reveals it.

# =============================================================================
# MORE AQUATIC
# =============================================================================

- common_name: Clownfish
  scientific_name: Amphiprion ocellaris
  status: LC
  taxonomy:
    class: Actinopterygii
    order: Perciformes
    family: Pomacentridae
  biome: Coral Reef
  range: Indo-Pacific tropical waters
  population_estimate: Common in healthy reefs
  primary_threats:
    - Coral reef degradation
    - Ocean acidification
    - Collection for aquarium trade
  description: Famous for their symbiotic relationship with sea anemones, whose stinging tentacles provide protection while the clownfish provides nutrients. All clownfish are born male and can change sex.
  intriguing_facts:
    - They are sequential hermaphrodites—the dominant fish becomes female
    - A mucus coating protects them from anemone stings
    - Finding Nemo caused a surge in capture that threatened wild populations
  beastique_material_suggestion: Bright orange enamel with white platinum bands
  beastique_narrative: The clownfish dances among stinging tentacles, living proof that the most dangerous places can become home when you learn the right dance.

- common_name: Anglerfish
  scientific_name: Melanocetus johnsonii
  status: NE
  taxonomy:
    class: Actinopterygii
    order: Lophiiformes
    family: Melanocetidae
  biome: Deep Ocean
  range: Atlantic and Antarctic Oceans (deep sea)
  population_estimate: Unknown
  primary_threats:
    - Climate change affecting deep sea
    - Deep sea mining
    - Bycatch
  description: A deep-sea predator with a bioluminescent lure that attracts prey in the eternal darkness. Males are tiny and fuse permanently to females, becoming parasitic sperm sources.
  intriguing_facts:
    - Males are 10x smaller than females and fuse to them, sharing blood supply
    - Their lure contains bioluminescent bacteria
    - They can swallow prey twice their own size thanks to expandable jaws
  beastique_material_suggestion: Deep black with phosphorescent lure element
  beastique_narrative: In the crushing darkness of the abyss, the anglerfish creates its own star—a lonely light in a universe of pressure and silence.

# =============================================================================
# MORE INSECTS
# =============================================================================

- common_name: Honeybee
  scientific_name: Apis mellifera
  status: NE
  taxonomy:
    class: Insecta
    order: Hymenoptera
    family: Apidae
  biome: Various - wherever flowering plants exist
  range: Worldwide (introduced globally from Europe)
  population_estimate: ~2 trillion managed, wild unknown
  primary_threats:
    - Colony Collapse Disorder
    - Pesticide exposure
    - Varroa mite infestations
  description: The world's most important pollinator, responsible for one-third of the food we eat. A superorganism with complex communication dances and democratic decision-making.
  intriguing_facts:
    - A single bee visits 50-1000 flowers in one collection trip
    - They communicate flower locations through a "waggle dance"
    - A hive must visit 2 million flowers to make one pound of honey
  beastique_material_suggestion: Gold and amber striped enamel with gossamer wings
  beastique_narrative: The honeybee dances the location of flowers into the minds of her sisters—a tiny mathematician whose absence would collapse our dinner tables.

- common_name: Dragonfly
  scientific_name: Anax imperator
  status: LC
  taxonomy:
    class: Insecta
    order: Odonata
    family: Aeshnidae
  biome: Freshwater wetlands, ponds, streams
  range: Europe, Africa, Middle East
  population_estimate: Common
  primary_threats:
    - Wetland drainage
    - Pollution
    - Climate change
  description: Ancient predators unchanged for 300 million years. They can fly in any direction including backwards, hover, and catch 95% of their prey—the most efficient hunters on Earth.
  intriguing_facts:
    - Their ancestors had 2-foot wingspans during the Carboniferous period
    - They can see in all directions simultaneously with 30,000 lenses per eye
    - Nymphs spend up to 5 years underwater before their 6-month adult life
  beastique_material_suggestion: Iridescent blue-green with transparent wing panels
  beastique_narrative: The dragonfly is a 300-million-year-old design that still outperforms our drones—evolution's perfect predator that reminds us innovation is ancient.
