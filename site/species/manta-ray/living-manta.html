    let f = 26000/(dist*dist);
    fx += (dx/dist)*f*0.5 - (dy/dist)*f;   // swirl + push
    fy += (dy/dist)*f*0.5 + (dx/dist)*f;
  }
  let m = Math.hypot(fx, fy) || 1;
  return [fx/m, fy/m];
}
function insideManta(x, y){ return sdfAt(x, y) > 2; }
function spawnInside(){
  for (let k=0;k<40;k++){
    let x = random(mbb.x0, mbb.x1), y = random(mbb.y0, mbb.y1);
    if (insideManta(x,y)) return {x,y,px:x,py:y,age:0,life:random(60,150)};
  }
  return {x:(mbb.x0+mbb.x1)/2, y:(mbb.y0+mbb.y1)/2, px:0, py:0, age:0, life:90};
}
function spawnTop(){ let x=random(-20,WORLD_W+20); return {x,y:random(-30,8),px:x,py:0,age:0,life:random(120,260)}; }

function buildBg(){
  bgGfx = createGraphics(WORLD_W, WORLD_H);
  let top = color(24,56,72), bot = color(5,10,17);
  for (let y=0;y<WORLD_H;y++){ bgGfx.stroke(lerpColor(top,bot,y/WORLD_H)); bgGfx.line(0,y,WORLD_W,y); }
}
function fitCanvas(){
  S = Math.min(windowWidth/WORLD_W, windowHeight/WORLD_H);
  offX = (windowWidth - WORLD_W*S)/2; offY = (windowHeight - WORLD_H*S)/2;
}
function reseed(s){
  SEED = (s===undefined) ? floor(random(1,99999)) : s;
  randomSeed(SEED); noiseSeed(SEED);
  ext = []; for (let i=0;i<900;i++) ext.push(spawnTop());
  intl = []; for (let i=0;i<520;i++) intl.push(spawnInside());
  plankton = []; for (let i=0;i<170;i++){ let x=random(WORLD_W),y=random(WORLD_H); plankton.push({x,y}); }
}

function setup(){
  let c = createCanvas(windowWidth, windowHeight); c.parent('wrap');
  let xs = MANTA.map(p=>p[0]), ys = MANTA.map(p=>p[1]);
  mbb = {x0:Math.min(...xs), y0:Math.min(...ys), x1:Math.max(...xs), y1:Math.max(...ys)};
  buildBg(); fitCanvas(); reseed(7);
  background(5,10,17);
  document.getElementById('seed').onclick = ()=>reseed();
}
function windowResized(){ resizeCanvas(windowWidth, windowHeight); fitCanvas(); }

function draw(){
  // mouse -> world
  mInBox = (mouseX>offX && mouseX<width-offX && mouseY>offY && mouseY<height-offY);
  mxW = (mouseX-offX)/S; myW = (mouseY-offY)/S;

  push();
  translate(offX, offY); scale(S);
  // fade trails by repainting gradient translucently
  tint(255, 26); image(bgGfx, 0, 0, WORLD_W, WORLD_H); noTint();

  // external current (parts around the ray)
  strokeWeight(1);
  for (let p of ext){
    let [fx,fy] = flow(p.x,p.y); let s = sdfAt(p.x,p.y);
    if (s > -34){
      let [nx,ny] = gradAt(p.x,p.y); let inward = fx*nx+fy*ny;
      if (inward>0){ fx-=inward*nx; fy-=inward*ny; }
      let push2 = Math.max(0,(s+34)/34); fx-=nx*push2*0.9; fy-=ny*push2*0.9;
      let m=Math.hypot(fx,fy)||1; fx/=m; fy/=m;
    }
    p.px=p.x; p.py=p.y; p.x+=fx*SPEED; p.y+=fy*SPEED; p.age++;
    let fade = s<0 ? Math.max(0,1-(-s)/240) : 0.4;
    stroke(60*fade+18, 120*fade+30, 140*fade+44, 26+40*fade);
    line(p.px,p.py,p.x,p.y);
    if (p.y>WORLD_H+20 || p.x<-30 || p.x>WORLD_W+30 || p.age>p.life) Object.assign(p, spawnTop());
  }
  // internal current (keeps the body lit)
  strokeWeight(2);
  for (let p of intl){
    let [fx,fy] = flow(p.x,p.y); let [nx,ny]=gradAt(p.x,p.y);
    fx-=nx*0.18; fy-=ny*0.18; let m=Math.hypot(fx,fy)||1; fx/=m; fy/=m;
    p.px=p.x; p.py=p.y; p.x+=fx*SPEED; p.y+=fy*SPEED; p.age++;
    let s=sdfAt(p.x,p.y); let t=constrain(s/60,0,1);
    stroke(150*(1-t)+120*t, 225*(1-t)+205*t, 238*(1-t)+228*t, 150);
    line(p.px,p.py,p.x,p.y);
    if (s<3 || p.age>p.life) Object.assign(p, spawnInside());
  }
  // plankton
  noStroke();
  for (let pl of plankton){
    let [fx,fy]=flow(pl.x,pl.y); pl.x+=fx*0.9; pl.y+=fy*0.9;
    if (pl.y>WORLD_H+6){ pl.y=-6; pl.x=random(WORLD_W); }
    let s=sdfAt(pl.x,pl.y);
    if (s>0){ fill(195,242,246,190); circle(pl.x,pl.y,random(2.4,4.4)); }
    else { fill(120,190,205,70); circle(pl.x,pl.y,2); }
  }
  // luminous rim (layered glow + bright core)
  noFill();
  let layers = [[16,10],[10,16],[6,28],[3,52]];
  for (let L of layers){
    stroke(150,235,245,L[1]); strokeWeight(L[0]);
    beginShape(); for (let p of MANTA) vertex(p[0],p[1]); endShape(CLOSE);
  }
  stroke(208,248,252,230); strokeWeight(2);
  beginShape(); for (let p of MANTA) vertex(p[0],p[1]); endShape(CLOSE);
  pop();

  // letterbox mask
  noStroke(); fill(5,9,15);
  rect(0,0,width,offY+1); rect(0,height-offY-1,width,offY+2);
  rect(0,0,offX+1,height); rect(width-offX-1,0,offX+2,height);
}
</script>
